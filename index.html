<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Pokédex</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app">
        <header>
            <h1>Pokédex TP1</h1>
            <p class="lead">Escriba el nombre del pokemon que desea buscar</p>
        </header>

        <main>
            <div id="resultado" aria-live="polite">
                <p class="empty">Introduce un nombre para comenzar</p>
            </div>
        </main>

        <div id="controls">
            <input type="text" id="pokemonInput" placeholder="Nombre del pokemon..." >
            <button id="obtenerPokemon">Obtener pokemon</button>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
